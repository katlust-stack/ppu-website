<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <defs>
    <linearGradient id="pagGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ebe0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d8d2c4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background transparent so it works on any background -->
  <rect width="480" height="120" fill="transparent"/>

  <!-- Open book icon -->
  <!-- Left page -->
  <path d="M22 32 L22 88 Q22 90 24 90 L58 84 Q60 83.5 60 82 L60 30 Q60 28 58 28.5 L24 34 Q22 34.5 22 36 Z"
        fill="url(#pagGrad)" opacity="0.95"/>
  <!-- Left page lines -->
  <line x1="28" y1="44" x2="54" y2="41" stroke="#93c5fd" stroke-width="1.2" opacity="0.5"/>
  <line x1="28" y1="51" x2="54" y2="48" stroke="#93c5fd" stroke-width="1.2" opacity="0.5"/>
  <line x1="28" y1="58" x2="54" y2="55" stroke="#93c5fd" stroke-width="1.2" opacity="0.5"/>
  <line x1="28" y1="65" x2="54" y2="62" stroke="#93c5fd" stroke-width="1.2" opacity="0.5"/>
  <line x1="28" y1="72" x2="46" y2="69.5" stroke="#93c5fd" stroke-width="1.2" opacity="0.5"/>

  <!-- Right page -->
  <path d="M98 32 L98 88 Q98 90 96 90 L62 84 Q60 83.5 60 82 L60 30 Q60 28 62 28.5 L96 34 Q98 34.5 98 36 Z"
        fill="url(#pagGrad)" opacity="0.95"/>
  <!-- Right page lines -->
  <line x1="66" y1="41" x2="92" y2="44" stroke="#93c5fd" stroke-width="1.2" opacity="0.5"/>
  <line x1="66" y1="48" x2="92" y2="51" stroke="#93c5fd" stroke-width="1.2" opacity="0.5"/>
  <line x1="66" y1="55" x2="92" y2="58" stroke="#93c5fd" stroke-width="1.2" opacity="0.5"/>
  <line x1="66" y1="62" x2="92" y2="65" stroke="#93c5fd" stroke-width="1.2" opacity="0.5"/>
  <line x1="66" y1="69.5" x2="84" y2="72" stroke="#93c5fd" stroke-width="1.2" opacity="0.5"/>

  <!-- Spine -->
  <path d="M58 28 Q60 27 62 28 L62 90 Q60 91 58 90 Z" fill="#93c5fd"/>

  <!-- Cover edges -->
  <path d="M22 36 L22 88 Q22 92 26 91 L58 85 L58 29 L26 33 Q22 34 22 36Z"
        fill="none" stroke="#e2e8f0" stroke-width="1" opacity="0.5"/>
  <path d="M98 36 L98 88 Q98 92 94 91 L62 85 L62 29 L94 33 Q98 34 98 36Z"
        fill="none" stroke="#e2e8f0" stroke-width="1" opacity="0.5"/>

  <!-- Blue accent dot on spine top -->
  <circle cx="60" cy="26" r="3" fill="#93c5fd"/>

  <!-- Main title -->
  <text x="118" y="52" font-family="Georgia, 'Times New Roman', serif"
        font-size="22" font-weight="700" fill="#ffffff" letter-spacing="0.5">
    Psychiatric Practice
  </text>
  <text x="118" y="78" font-family="Georgia, 'Times New Roman', serif"
        font-size="22" font-weight="700" fill="#ffffff" letter-spacing="0.5">
    Updates
  </text>

  <!-- Blue accent underline -->
  <rect x="118" y="83" width="148" height="2.5" fill="#93c5fd" rx="1.5"/>

  <!-- Subtitle -->
  <text x="118" y="100" font-family="Georgia, 'Times New Roman', serif"
        font-size="11" fill="#93c5fd" letter-spacing="2" font-style="italic">
    Curated for Clinicians
  </text>
</svg>
